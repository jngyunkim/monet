name: Release

# Push a tag like v0.1.1 to build a signed macOS release with updater
# artifacts (.app.tar.gz + .sig) and a latest.json the app reads to self-update.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: monet-app/src-tauri

      - name: Install frontend dependencies
        working-directory: monet-app
        run: npm ci

      # Import our stable self-signed code-signing cert into a dedicated keychain
      # and TRUST it for code signing, so tauri's `find-identity -v` sees it as a
      # valid identity. (tauri-action's own import doesn't trust the cert, which a
      # self-signed cert requires to resolve.) No notarization — self-signed.
      - name: Set up code-signing keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/monet-signing.keychain-db"
          KPW="$(openssl rand -hex 20)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          # Trust the self-signed cert for code signing (makes it a "valid" identity).
          # Add to the SYSTEM keychain via sudo — the user-domain variant pops an
          # interactive auth dialog that hangs a headless runner forever.
          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p "$KEYCHAIN" > "$RUNNER_TEMP/monet-cert.pem"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$RUNNER_TEMP/monet-cert.pem"
          # Make it the default keychain and first in the search list.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[",]//g')
          security default-keychain -s "$KEYCHAIN"
          echo "Valid code-signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Sign with the trusted identity already in the keychain (do NOT set
          # APPLE_CERTIFICATE here — that would trigger a second, untrusted import).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: monet-app
          tagName: ${{ github.ref_name }}
          releaseName: "Monet ${{ github.ref_name }}"
          releaseBody: "Download the .dmg to install. Existing installs update in-app."
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
